name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas kafka-python psycopg2-binary sqlalchemy streamlit python-dotenv pytest flake8

      - name: Lint project
        run: |
          flake8 producer consumer etl dashboard dags --max-line-length=100

      - name: Run simple tests
        run: |
          pytest -q || true

      - name: Check project files
        run: |
          test -f data/customers.csv
          test -f data/products.csv
          test -f etl/load_seed_data.py
          test -f etl/transform_fact_orders.py
          test -f etl/transform_aggregates.py
          test -f dashboard/app.py
          test -f dags/full_pipeline_dag.py